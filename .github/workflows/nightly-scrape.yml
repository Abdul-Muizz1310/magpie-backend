name: nightly-scrape
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Source name (blank = all)"
        required: false
jobs:
  run:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        source: [hackernews, arxiv-cs, weather-live]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install uv
      - run: uv sync --frozen
      - name: Install Playwright chromium
        if: matrix.source == 'weather-live'
        run: uv run playwright install chromium --with-deps
      - name: Apply migrations (idempotent)
        run: uv run python -m magpie.cli migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: uv run python -m magpie.cli run ${{ matrix.source }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
