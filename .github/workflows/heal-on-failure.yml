name: heal-on-failure
on:
  workflow_run:
    workflows: [nightly-scrape]
    types: [completed]
  # Manual trigger lets you run the healer on demand — useful when nightly-
  # scrape succeeds at the workflow level but you still suspect broken
  # selectors (e.g. min-item underflow that didn't raise).
  workflow_dispatch:
    inputs:
      source:
        description: "Source name to heal (blank = all most-recent failed runs)"
        required: false
jobs:
  heal:
    # Always run on manual dispatch; on workflow_run only when nightly-scrape
    # actually failed.
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
          || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install uv
      - run: uv sync --frozen
      - name: Install Playwright chromium
        run: uv run playwright install chromium --with-deps
      - run: uv run python -m magpie.healer.run
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_PAT_SCRAPE_HEALER: ${{ secrets.PAT_SCRAPE_HEALER }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_REPO: Abdul-Muizz1310/magpie-backend
          GITHUB_HEAL_LABEL: "scrape:self-heal"
          HEAL_SOURCE_FILTER: ${{ inputs.source }}
