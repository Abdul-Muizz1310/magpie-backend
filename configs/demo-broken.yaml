name: demo-broken
description: Deliberately broken config to demonstrate self-healing
url: https://news.ycombinator.com
render: false
schedule: "0 0 1 1 *"
rate_limit: { rps: 1 }

item:
  container: "tr.athing"
  fields:
    - { name: title, selector: "span.nonexistent-class > a::text" }
    - { name: url, selector: "span.nonexistent-class > a::attr(href)" }
    - { name: id, selector: "::attr(id)" }
  dedupe_key: id

health:
  min_items: 20
  max_staleness: "24h"
